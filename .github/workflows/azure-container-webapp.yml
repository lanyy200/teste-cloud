name: Build and deploy a container to an Azure Web App

env: AZURE_WEBAPP_NAME: 'webapp-aula1' # set this to the name of your Azure Web App on: push: branches: [ "main" ] workflow_dispatch:
permissions: contents: read
jobs: build: runs-on: ubuntu-latest steps:
-	uses: actions/checkout@v4


-	name: Login no Azure uses: azure/login@v1 with:
creds: ${{ secrets.AZURE_CREDENTIALS }}


-	name: Login no ACR
run: az acr login --name acraula1

-	name: Set up Docker Buildx
uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

-	name: Log in to GitHub container registry
uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0 with:
registry: ghcr.io
username: ${{ github.actor }} password: ${{ github.token }}

-	name: Lowercase the repo name and username
run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}


-	name: Login no ACR
run: az acr login --name acraula1

-	name: Build Docker run: |
docker build -t acraula1-bffcbtcrc7eef5fc.azurecr.io/minha-app:latest .

-	name: Push Docker run: |
 
docker push acraula1-bffcbtcrc7eef5fc.azurecr.io/minha-app:latest


deploy: permissions: contents: none runs-on: ubuntu-latest needs: build environment: name: 'Development' url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

steps:
-	name: Lowercase the repo name and username
run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
